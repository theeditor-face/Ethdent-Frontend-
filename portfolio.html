<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio — Home of Pentesters</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#c9a84c;--gold-d:#7a5f25;--black:#000;--bg:#050505;--bg2:#0a0a0a;--bg3:#0f0f0f;--green:#00ff41;--red:#ff2244;--cyan:#00d4ff;--yellow:#ffd200;--orange:#ff8c00;--border:rgba(201,168,76,.15);--border2:rgba(201,168,76,.35);--text:#c8c8c8;--text-dim:#666;--text-dimmer:#333}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;cursor:none;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:9998}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:var(--gold-d)}
a{color:inherit;text-decoration:none}button{font-family:'Rajdhani',sans-serif;cursor:none}
#cur,#cur2{position:fixed;border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%)}
#cur{width:22px;height:22px;border:1.5px solid var(--gold);mix-blend-mode:difference}
#cur2{width:5px;height:5px;background:var(--gold)}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(0,0,0,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(16px)}
.nav-logo{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);letter-spacing:5px;font-weight:900}
.nav-logo em{color:#fff;font-style:normal}
.nav-links{display:flex;gap:20px;list-style:none}
.nav-links a{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;transition:color .2s;cursor:none}
.nav-links a:hover{color:var(--gold)}
.nav-links a.active{color:var(--gold)}
.nav-r{display:flex;align-items:center;gap:10px}
.nav-dot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#nav-clock{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--text-dim)}
.page-header{padding:110px 40px 56px;border-bottom:1px solid var(--border);background:var(--bg);position:relative;overflow:hidden}
.ph-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.025) 1px,transparent 1px);background-size:72px 72px}
.ph-content{position:relative;z-index:1;max-width:1280px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
.ph-eyebrow{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--gold-d);letter-spacing:6px;text-transform:uppercase;margin-bottom:10px}
.ph-eyebrow::before{content:'// '}
.ph-title{font-family:'Cinzel',serif;font-size:clamp(2rem,4vw,3.4rem);font-weight:900;color:var(--gold);letter-spacing:6px;line-height:1;text-shadow:0 0 60px rgba(201,168,76,.2)}
.ph-sub{font-family:'Rajdhani',sans-serif;font-size:.95rem;color:var(--text-dim);margin-top:10px}
.ph-stats{display:flex;gap:28px;flex-wrap:wrap}
.ph-stat{text-align:center}
.ph-stat-n{font-family:'Cinzel',serif;font-size:1.9rem;color:var(--gold);display:block;line-height:1}
.ph-stat-l{font-family:'Share Tech Mono',monospace;font-size:.56rem;color:var(--text-dimmer);letter-spacing:3px;text-transform:uppercase;margin-top:4px;display:block}
.toolbar{max-width:1280px;margin:0 auto;padding:20px 40px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.fb{padding:5px 14px;border:1px solid #1a1a1a;background:transparent;font-family:'Share Tech Mono',monospace;font-size:.58rem;color:#444;letter-spacing:2px;text-transform:uppercase;cursor:none;transition:all .2s}
.fb:hover,.fb.active{border-color:var(--gold-d);color:var(--gold)}
.tb-search{flex:1;min-width:160px;background:#080808;border:1px solid #1a1a1a;padding:7px 14px;font-family:'Share Tech Mono',monospace;font-size:.68rem;color:#aaa;outline:none;transition:border-color .2s;cursor:none}
.tb-search:focus{border-color:var(--gold-d)}.tb-search::placeholder{color:#2a2a2a}
.add-btn{padding:8px 22px;border:1px solid var(--gold);background:transparent;font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--gold);letter-spacing:3px;text-transform:uppercase;cursor:none;position:relative;overflow:hidden;transition:color .3s;white-space:nowrap}
.add-btn::before{content:'';position:absolute;inset:0;background:var(--gold);transform:translateX(-101%);transition:transform .3s;z-index:-1}
.add-btn:hover{color:#000}.add-btn:hover::before{transform:translateX(0)}
.portfolio-wrap{max-width:1280px;margin:0 auto;padding:40px}
#portfolio-list{display:flex;flex-direction:column;gap:2px}
.p-item{background:var(--bg2);border:1px solid transparent;transition:border-color .25s,background .25s}
.p-item:hover{background:var(--bg3);border-color:var(--border)}
.p-item-inner{display:grid;grid-template-columns:260px 1fr auto}
.p-media{width:260px;height:170px;overflow:hidden;position:relative;background:#070707;border-right:1px solid var(--border);flex-shrink:0;cursor:none}
.p-media img{width:100%;height:100%;object-fit:cover;transition:transform .4s;filter:brightness(.85)}
.p-item:hover .p-media img{transform:scale(1.04);filter:brightness(1)}
.p-media-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--text-dimmer);letter-spacing:2px;flex-direction:column;gap:6px}
.p-vid-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);border:1px solid var(--gold-d);padding:2px 7px;font-family:'Share Tech Mono',monospace;font-size:.52rem;color:var(--gold-d);letter-spacing:2px}
.p-body{padding:24px 28px;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
.p-number{font-family:'Share Tech Mono',monospace;font-size:.56rem;color:var(--text-dimmer);letter-spacing:3px;margin-bottom:6px}
.p-title{font-family:'Cinzel',serif;font-size:1.1rem;color:#aaa;margin-bottom:7px;transition:color .2s}
.p-item:hover .p-title{color:var(--gold)}
.p-desc{font-size:.85rem;color:var(--text-dim);line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.p-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.p-tag{font-family:'Share Tech Mono',monospace;font-size:.54rem;color:var(--gold-d);border:1px solid rgba(201,168,76,.18);padding:2px 8px;letter-spacing:1px;text-transform:uppercase}
.p-tag.htb{border-color:rgba(159,239,0,.2);color:#9fef00}
.p-tag.thm{border-color:rgba(0,212,255,.2);color:var(--cyan)}
.p-tag.ctf{border-color:rgba(255,140,0,.2);color:var(--orange)}
.p-tag.bug{border-color:rgba(255,34,68,.2);color:var(--red)}
.p-links{display:flex;gap:8px;flex-wrap:wrap}
.p-link{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text-dimmer);border:1px solid #1a1a1a;padding:4px 11px;letter-spacing:2px;text-transform:uppercase;transition:all .2s;cursor:none}
.p-link:hover{border-color:var(--gold-d);color:var(--gold)}
.p-actions{padding:18px 14px;display:flex;flex-direction:column;gap:7px;border-left:1px solid var(--border);justify-content:center;min-width:80px}
.p-act{padding:5px 12px;border:1px solid #1a1a1a;background:transparent;font-family:'Share Tech Mono',monospace;font-size:.58rem;color:#444;letter-spacing:2px;cursor:none;transition:all .2s;white-space:nowrap}
.p-act:hover{border-color:var(--gold-d);color:var(--gold-d)}
.p-act.del:hover{border-color:rgba(255,34,68,.4);color:var(--red)}
.p-date{font-family:'Share Tech Mono',monospace;font-size:.54rem;color:var(--text-dimmer);text-align:center}
.empty-state{padding:90px 40px;text-align:center}
.empty-icon{font-size:2.8rem;opacity:.15;margin-bottom:20px}
.empty-title{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--text-dimmer);letter-spacing:4px;margin-bottom:10px}
.empty-sub{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--text-dimmer);letter-spacing:2px;line-height:2}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:5000;align-items:flex-start;justify-content:center;padding:70px 20px;overflow-y:auto}
#modal-overlay.active{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);width:100%;max-width:680px;box-shadow:0 0 80px rgba(201,168,76,.1);margin:auto}
.modal-header{padding:26px 30px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);letter-spacing:4px}
.modal-close{width:30px;height:30px;border:1px solid #222;background:transparent;color:#555;cursor:none;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:.9rem}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.modal-body{padding:28px 30px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.f-row.full{grid-template-columns:1fr;margin-bottom:16px}
.f-group{display:flex;flex-direction:column;gap:6px}
.f-label{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase}
.f-input,.f-select,.f-textarea{background:#070707;border:1px solid #1a1a1a;color:#bbb;padding:9px 13px;font-family:'Share Tech Mono',monospace;font-size:.73rem;outline:none;transition:border-color .2s;cursor:none;width:100%}
.f-input:focus,.f-select:focus,.f-textarea:focus{border-color:var(--gold-d)}.f-select option{background:#111}
.f-textarea{resize:vertical;min-height:80px;line-height:1.7}
.f-hint{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--text-dimmer);letter-spacing:1px}
.file-btn{display:block;padding:9px 13px;background:#070707;border:1px dashed #222;font-family:'Share Tech Mono',monospace;font-size:.62rem;color:#555;letter-spacing:2px;text-align:center;cursor:none;transition:all .2s;position:relative}
.file-btn:hover{border-color:var(--gold-d);color:var(--gold-d)}
#f-file{position:absolute;inset:0;opacity:0;cursor:none;width:100%;height:100%}
.media-preview{width:100%;height:140px;background:#070707;border:1px solid #1a1a1a;display:flex;align-items:center;justify-content:center;margin-top:6px;overflow:hidden}
.media-preview img,.media-preview video{width:100%;height:100%;object-fit:cover}
.media-preview-ph{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text-dimmer);letter-spacing:2px}
.modal-footer{padding:18px 30px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.m-btn{padding:9px 22px;border:1px solid;background:transparent;font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:3px;text-transform:uppercase;cursor:none;transition:all .2s}
.m-btn.cancel{border-color:#222;color:#555}.m-btn.cancel:hover{border-color:#444;color:#888}
.m-btn.save{border-color:var(--gold);color:var(--gold)}.m-btn.save:hover{background:var(--gold);color:#000}
#viewer-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:6000;align-items:center;justify-content:center;padding:36px}
#viewer-modal.active{display:flex}
.vm-inner{width:100%;max-width:880px;position:relative}
.vm-close{position:absolute;top:-42px;right:0;background:transparent;border:1px solid #333;color:#666;width:34px;height:34px;cursor:none;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:1rem}
.vm-close:hover{border-color:var(--red);color:var(--red)}
#vm-content video{width:100%;max-height:72vh}
#vm-content img{width:100%;max-height:80vh;object-fit:contain}
#notif{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--gold-d);padding:12px 20px;font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--gold);z-index:9000;transform:translateX(130%);transition:transform .35s ease;max-width:280px;pointer-events:none}
#notif.on{transform:translateX(0)}#notif::before{content:'▸  '}
@media(max-width:900px){.p-item-inner{grid-template-columns:1fr}.p-media{width:100%;height:200px;border-right:none;border-bottom:1px solid var(--border)}.p-actions{flex-direction:row;border-left:none;border-top:1px solid var(--border);padding:12px 18px}.toolbar,.portfolio-wrap{padding-left:18px;padding-right:18px}.page-header{padding:90px 18px 44px}.f-row{grid-template-columns:1fr}nav{padding:0 18px}}
</style>
</head>
<body>
<div id="cur"></div><div id="cur2"></div>
<div id="notif"></div>
<nav>
  <div class="nav-logo">H<em>o</em>P</div>
  <ul class="nav-links">
    <li><a href="index.html">Hub</a></li>
    <li><a href="portfolio.html" class="active">Portfolio</a></li>
    <li><a href="chat.html" style="color:var(--cyan)">Chat</a></li>
  </ul>
  <div class="nav-r"><div class="nav-dot"></div><span id="nav-clock">00:00:00</span></div>
</nav>
<div class="page-header">
  <div class="ph-grid"></div>
  <div class="ph-content">
    <div>
      <div class="ph-eyebrow">Security Portfolio</div>
      <div class="ph-title">My Work</div>
      <div class="ph-sub">Engagements, CTFs, bug bounties and research</div>
    </div>
    <div class="ph-stats">
      <div class="ph-stat"><span class="ph-stat-n" id="stat-total">0</span><span class="ph-stat-l">Projects</span></div>
      <div class="ph-stat"><span class="ph-stat-n" id="stat-htb" style="color:#9fef00">0</span><span class="ph-stat-l">HackTheBox</span></div>
      <div class="ph-stat"><span class="ph-stat-n" id="stat-ctf" style="color:var(--orange)">0</span><span class="ph-stat-l">CTFs</span></div>
      <div class="ph-stat"><span class="ph-stat-n" id="stat-bug" style="color:var(--red)">0</span><span class="ph-stat-l">Bug Bounty</span></div>
    </div>
  </div>
</div>
<div class="toolbar">
  <button class="fb active" onclick="filterP(this,'all')">ALL</button>
  <button class="fb" onclick="filterP(this,'HackTheBox')">HTB</button>
  <button class="fb" onclick="filterP(this,'TryHackMe')">THM</button>
  <button class="fb" onclick="filterP(this,'CTF')">CTF</button>
  <button class="fb" onclick="filterP(this,'Bug Bounty')">BUG BOUNTY</button>
  <button class="fb" onclick="filterP(this,'Real Engagement')">REAL</button>
  <input class="tb-search" id="tb-search" placeholder="search projects..." oninput="searchP(this.value)"/>
  <button class="add-btn" onclick="openModal()">+ ADD PROJECT</button>
</div>
<div class="portfolio-wrap"><div id="portfolio-list"></div></div>
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-header"><span class="modal-title" id="modal-title-txt">Add Project</span><button class="modal-close" onclick="closeModal()">X</button></div>
    <div class="modal-body">
      <div class="f-row full"><div class="f-group"><label class="f-label">Project Title</label><input class="f-input" id="f-title" placeholder="HTB — Lame (CVE-2007-2447)"/></div></div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">Category</label><select class="f-select" id="f-cat"><option>HackTheBox</option><option>TryHackMe</option><option>CTF</option><option>Bug Bounty</option><option>Real Engagement</option><option>Research</option><option>Tool/Script</option><option>Other</option></select></div>
        <div class="f-group"><label class="f-label">Difficulty</label><select class="f-select" id="f-diff"><option>Easy</option><option>Medium</option><option>Hard</option><option>Insane</option><option>Critical</option><option>High</option><option>N/A</option></select></div>
      </div>
      <div class="f-row full"><div class="f-group"><label class="f-label">Description</label><textarea class="f-textarea" id="f-desc" placeholder="What was the target? What did you find? What techniques?"></textarea></div></div>
      <div class="f-row full"><div class="f-group"><label class="f-label">Tags (comma separated)</label><input class="f-input" id="f-tags" placeholder="linux, rce, samba, privesc"/></div></div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">Writeup URL</label><input class="f-input" id="f-writeup" placeholder="https://..."/></div>
        <div class="f-group"><label class="f-label">GitHub URL</label><input class="f-input" id="f-github" placeholder="https://github.com/..."/></div>
      </div>
      <div class="f-row full"><div class="f-group"><label class="f-label">Extra Link</label><input class="f-input" id="f-link3" placeholder="YouTube, blog post, CVE link..."/></div></div>
      <div class="f-row full"><div class="f-group"><label class="f-label">Screenshot or Video</label><div class="file-btn" id="file-btn-lbl">Click to upload image or video<input type="file" id="f-file" accept="image/*,video/*" onchange="handleFile(this)"/></div><div class="f-hint">PNG, JPG, GIF, WebP or MP4, WebM — stored in browser</div><div class="media-preview" id="media-preview"><span class="media-preview-ph">No media</span></div></div></div>
    </div>
    <div class="modal-footer"><button class="m-btn cancel" onclick="closeModal()">CANCEL</button><button class="m-btn save" onclick="saveProject()">SAVE PROJECT</button></div>
  </div>
</div>
<div id="viewer-modal"><div class="vm-inner"><button class="vm-close" onclick="closeViewer()">X</button><div id="vm-content"></div></div></div>
<script>
var CC=document.getElementById('cur'),DD=document.getElementById('cur2'),mx=0,my=0,cx=0,cy=0;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;DD.style.left=mx+'px';DD.style.top=my+'px';});
(function a(){cx+=(mx-cx)*.14;cy+=(my-cy)*.14;CC.style.left=cx+'px';CC.style.top=cy+'px';requestAnimationFrame(a);})();
setInterval(function(){document.getElementById('nav-clock').textContent=new Date().toTimeString().slice(0,8);},1000);
document.addEventListener('contextmenu',function(e){e.preventDefault();});
document.addEventListener('keydown',function(e){if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='U'))e.preventDefault();});
function notify(msg){var n=document.getElementById('notif');n.textContent=msg;n.classList.add('on');setTimeout(function(){n.classList.remove('on');},3000);}
var editIdx=null,mediaData=null,mediaType=null,activeFilter='all',activeSearch='';
function loadP(){return JSON.parse(localStorage.getItem('hop_portfolio'))||[];}
function saveP(d){localStorage.setItem('hop_portfolio',JSON.stringify(d));}
function renderPortfolio(){
  var all=loadP();
  document.getElementById('stat-total').textContent=all.length;
  document.getElementById('stat-htb').textContent=all.filter(function(p){return p.cat==='HackTheBox';}).length;
  document.getElementById('stat-ctf').textContent=all.filter(function(p){return p.cat==='CTF';}).length;
  document.getElementById('stat-bug').textContent=all.filter(function(p){return p.cat==='Bug Bounty';}).length;
  var list=all;
  if(activeFilter!=='all')list=list.filter(function(p){return p.cat===activeFilter;});
  if(activeSearch)list=list.filter(function(p){var q=activeSearch.toLowerCase();return (p.title||'').toLowerCase().includes(q)||(p.desc||'').toLowerCase().includes(q)||(p.tags||[]).join(' ').toLowerCase().includes(q);});
  var el=document.getElementById('portfolio-list');
  if(!list.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">&#9670;</div><div class="empty-title">'+(all.length?'NO RESULTS':'NO PROJECTS YET')+'</div><div class="empty-sub">'+(all.length?'Try different filter.':'Click + ADD PROJECT to start.')+'</div></div>';return;}
  var tagCls={HackTheBox:'htb',TryHackMe:'thm',CTF:'ctf','Bug Bounty':'bug','Real Engagement':''};
  var diffCol={Easy:'var(--green)',Medium:'var(--yellow)',Hard:'var(--orange)',Insane:'var(--red)',Critical:'var(--red)',High:'var(--orange)'};
  el.innerHTML=list.map(function(p){
    var realIdx=all.indexOf(p);
    var num=String(realIdx+1).padStart(3,'0');
    var mediaHtml='';
    if(p.media){
      if(p.mediaType==='video'){mediaHtml='<div class="p-media" onclick="openViewer('+realIdx+')" style="cursor:none"><video src="'+p.media+'" muted style="width:100%;height:100%;object-fit:cover;filter:brightness(.7)"></video><div class="p-vid-badge">VIDEO</div></div>';}
      else{mediaHtml='<div class="p-media" onclick="openViewer('+realIdx+')" style="cursor:none"><img src="'+p.media+'" alt=""/></div>';}
    }else{mediaHtml='<div class="p-media"><div class="p-media-ph">NO MEDIA</div></div>';}
    var links='';
    if(p.writeup)links+='<a href="'+p.writeup+'" target="_blank" class="p-link">WRITEUP</a>';
    if(p.github)links+='<a href="'+p.github+'" target="_blank" class="p-link">GITHUB</a>';
    if(p.link3)links+='<a href="'+p.link3+'" target="_blank" class="p-link">LINK</a>';
    var tc=tagCls[p.cat]||'';
    return '<div class="p-item"><div class="p-item-inner">'+mediaHtml+'<div class="p-body"><div><div class="p-number">#'+num+' &middot; <span style="color:'+(diffCol[p.diff]||'var(--text-dimmer)')+'">'+( p.diff||'')+'</span> &middot; '+(p.cat||'')+'</div><div class="p-title">'+(p.title||'Untitled')+'</div><div class="p-desc">'+(p.desc||'')+'</div><div class="p-tags">'+(p.cat?'<span class="p-tag '+tc+'">'+p.cat+'</span>':'')+( p.tags||[]).map(function(t){return '<span class="p-tag">'+t+'</span>';}).join('')+'</div></div><div class="p-links">'+links+'</div></div><div class="p-actions"><button class="p-act" onclick="editProject('+realIdx+')">EDIT</button><button class="p-act del" onclick="deleteProject('+realIdx+')">DELETE</button><div class="p-date">'+(p.date?p.date.slice(0,10):'')+'</div></div></div></div>';
  }).join('');
}
function filterP(btn,cat){document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');activeFilter=cat;renderPortfolio();}
function searchP(q){activeSearch=q;renderPortfolio();}
function openModal(idx){
  editIdx=(idx!==undefined)?idx:null;
  mediaData=null;mediaType=null;
  document.getElementById('media-preview').innerHTML='<span class="media-preview-ph">No media</span>';
  document.getElementById('file-btn-lbl').childNodes[0].textContent='Click to upload image or video';
  document.getElementById('modal-title-txt').textContent=editIdx!==null?'Edit Project':'Add Project';
  if(editIdx!==null){
    var p=loadP()[editIdx];
    document.getElementById('f-title').value=p.title||'';document.getElementById('f-cat').value=p.cat||'HackTheBox';
    document.getElementById('f-diff').value=p.diff||'Easy';document.getElementById('f-desc').value=p.desc||'';
    document.getElementById('f-tags').value=(p.tags||[]).join(', ');document.getElementById('f-writeup').value=p.writeup||'';
    document.getElementById('f-github').value=p.github||'';document.getElementById('f-link3').value=p.link3||'';
    if(p.media){mediaData=p.media;mediaType=p.mediaType;showPreview(p.media,p.mediaType);document.getElementById('file-btn-lbl').childNodes[0].textContent='Media loaded (upload new to replace)';}
  }else{
    ['f-title','f-desc','f-tags','f-writeup','f-github','f-link3'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('f-cat').value='HackTheBox';document.getElementById('f-diff').value='Easy';
  }
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('active');editIdx=null;}
function handleFile(input){
  var file=input.files[0];if(!file)return;
  var isVideo=file.type.startsWith('video/');
  var isImage=file.type.startsWith('image/');
  if(!isVideo&&!isImage){notify('Upload an image or video');return;}
  document.getElementById('file-btn-lbl').childNodes[0].textContent='Loading...';
  var reader=new FileReader();
  reader.onload=function(e){
    mediaData=e.target.result;mediaType=isVideo?'video':'image';
    showPreview(mediaData,mediaType);
    document.getElementById('file-btn-lbl').childNodes[0].textContent=file.name;
    notify((isVideo?'Video':'Image')+' loaded');
  };
  reader.readAsDataURL(file);
}
function showPreview(data,type){
  var p=document.getElementById('media-preview');
  if(type==='video'){p.innerHTML='<video src="'+data+'" controls style="width:100%;height:100%;object-fit:cover"></video>';}
  else{p.innerHTML='<img src="'+data+'" style="width:100%;height:100%;object-fit:cover"/>';}
}
function saveProject(){
  var title=document.getElementById('f-title').value.trim();
  if(!title){notify('Enter a project title');document.getElementById('f-title').focus();return;}
  var project={title:title,cat:document.getElementById('f-cat').value,diff:document.getElementById('f-diff').value,desc:document.getElementById('f-desc').value.trim(),tags:document.getElementById('f-tags').value.split(',').map(function(t){return t.trim();}).filter(Boolean),writeup:document.getElementById('f-writeup').value.trim(),github:document.getElementById('f-github').value.trim(),link3:document.getElementById('f-link3').value.trim(),media:mediaData||null,mediaType:mediaType||null,date:editIdx!==null?(loadP()[editIdx].date||new Date().toISOString()):new Date().toISOString(),updated:new Date().toISOString()};
  var projects=loadP();
  if(editIdx!==null){projects[editIdx]=project;notify('Project updated');}
  else{projects.unshift(project);notify('Project saved');}
  saveP(projects);closeModal();renderPortfolio();
}
function editProject(idx){openModal(idx);}
function deleteProject(idx){if(!confirm('Delete this project?'))return;var p=loadP();p.splice(idx,1);saveP(p);renderPortfolio();notify('Deleted');}
function openViewer(idx){
  var p=loadP()[idx];if(!p||!p.media)return;
  var vm=document.getElementById('viewer-modal');var content=document.getElementById('vm-content');
  if(p.mediaType==='video'){content.innerHTML='<video src="'+p.media+'" controls autoplay style="width:100%;max-height:70vh"></video>';}
  else{content.innerHTML='<img src="'+p.media+'" style="width:100%;max-height:80vh;object-fit:contain"/>';}
  vm.classList.add('active');
}
function closeViewer(){document.getElementById('viewer-modal').classList.remove('active');document.getElementById('vm-content').innerHTML='';}
document.getElementById('viewer-modal').addEventListener('click',function(e){if(e.target===this)closeViewer();});
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeViewer();}});
renderPortfolio();
</script>
</body>
</html>
